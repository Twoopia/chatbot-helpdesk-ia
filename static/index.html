<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help Desk IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="grain"></div>

<div class="overlay" id="overlay" onclick="closeFaqDrawer()"></div>

<div class="app">

  <!-- ── Sidebar ─────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🤖</span>
        <span class="logo-text">Help Desk IA</span>
      </div>
      <button class="new-chat-btn" id="newChatBtn">+ Nova Conversa</button>
    </div>

    <div class="sidebar-scroll">
      <div class="sidebar-section">
        <h3>Categorias FAQ</h3>
        <div id="faqCategories"></div>
      </div>

      <div class="sidebar-section">
        <h3>Conversas Recentes</h3>
        <div id="sessionsList"></div>
      </div>
    </div>
  </aside>

  <!-- ── Chat Main ────────────────────────────────── -->
  <main class="chat-main">

    <div class="chat-header">
      <div class="chat-status">
        <span class="status-dot connecting" id="statusDot"></span>
        <span id="statusText">Conectando…</span>
      </div>
      <span class="header-title">Suporte Técnico</span>
      <div class="chat-actions">
        <button class="btn-icon" id="faqBtn" title="Ver FAQ" onclick="openFaqDrawer()">❓</button>
        <button class="btn-icon" id="clearBtn" title="Limpar conversa">🗑️</button>
      </div>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">🤖</div>
        <h2>Help Desk IA</h2>
        <p>Olá! Sou seu assistente de suporte técnico.<br>Como posso ajudar você hoje?</p>
        <div class="quick-actions">
          <button class="quick-btn" onclick="sendQuick('Como resetar minha senha?')">🔑 Resetar senha</button>
          <button class="quick-btn" onclick="sendQuick('Estou sem acesso à internet')">🌐 Sem internet</button>
          <button class="quick-btn" onclick="sendQuick('Impressora não funciona')">🖨️ Impressora</button>
          <button class="quick-btn" onclick="sendQuick('Como conectar à VPN?')">🔒 VPN</button>
          <button class="quick-btn" onclick="sendQuick('Como abrir um chamado?')">🎫 Abrir chamado</button>
          <button class="quick-btn" onclick="sendQuick('Como instalar um programa?')">💿 Instalar software</button>
        </div>
      </div>
    </div>

    <div class="typing-indicator" id="typingIndicator" style="display:none">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span class="typing-text">Assistente digitando…</span>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="messageInput"
          placeholder="Digite sua dúvida técnica…"
          rows="1"
          autofocus
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">
        <kbd>Enter</kbd> para enviar &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> para nova linha
      </div>
    </div>
  </main>
</div>

<!-- ── FAQ Drawer ──────────────────────────────────── -->
<aside class="faq-drawer" id="faqDrawer">
  <div class="faq-drawer-header">
    <h3>Perguntas Frequentes</h3>
    <button class="faq-close" onclick="closeFaqDrawer()">✕</button>
  </div>
  <div class="faq-drawer-body" id="faqDrawerBody">
    <p style="color:var(--text-secondary);font-size:13px">Carregando FAQ…</p>
  </div>
</aside>

<script src="/static/js/app.js"></script>
</body>
</html>
